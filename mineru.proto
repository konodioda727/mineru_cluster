syntax = "proto3";

package historyrag.mineru.v1;

service MineruPdfExtractor {
  rpc ParsePdf(ParsePdfRequest) returns (ParsePdfResponse);
}

message ParsePdfRequest {
  string filename = 1;
  bytes file_content = 2;
  string language_hint = 3;
  string layout_hint = 4;
  string document_type_hint = 5;
  string book_page_start_pdf_page = 6;
  string book_page_start_value = 7;
  string model_version = 8;
}

message ParsePdfResponse {
  string task_id = 1;
  StructuredDocument document = 2;
}

message StructuredDocument {
  string title = 1;
  string full_text = 2;
  repeated Page pages = 3;
}

message Page {
  int32 pdf_page_no = 1;
  string text = 2;
  repeated Paragraph paragraphs = 3;
  int32 page_no = 4;
  int32 book_page_no = 5;
  string page_number_source = 6;
  int32 page_width = 7;
  int32 page_height = 8;
}

message Paragraph {
  string paragraph_id = 1;
  int32 paragraph_no = 2;
  int32 paragraph_no_in_doc = 3;
  string text = 4;
  int32 line_start = 5;
  int32 line_end = 6;
  BBox bbox = 7;
  string bbox_source = 8;
}

message BBox {
  double x = 1;
  double y = 2;
  double width = 3;
  double height = 4;
}

